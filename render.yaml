# VybeKart Backend – Render Blueprint (free tier)
# Render free tier blocks outbound SMTP (ports 25/465/587). For "Highlight your concerns" email,
# set RESEND_API_KEY in Dashboard (get one at https://resend.com). App uses Resend when set, else SMTP.

services:
  - type: keyvalue
    name: vybekart-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  - type: web
    runtime: docker
    name: vybekart-backend
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      # Must match the public HTTPS origin (same host the Android app uses in BASE_URL).
      - key: API_PUBLIC_URL
        value: "https://vybekart-backend.onrender.com"
      # Uploads fallback: when a file is missing from `/uploads/**` on this server,
      # redirect to Supabase public storage bucket.
      - key: SUPABASE_URL
        value: "https://axcsnealmdadjryogrnl.supabase.co"
      - key: SUPABASE_PUBLIC_BUCKET
        value: "Vybekart"
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        value: "postgresql://postgres.axcsnealmdadjryogrnl:Vishal%4022337963@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true"
      - key: DIRECT_URL
        value: "postgresql://postgres.axcsnealmdadjryogrnl:Vishal%4022337963@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&connect_timeout=30"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vybekart-redis
          property: connectionString
      - key: JWT_SECRET
        value: "2f7c9e5a8a4d9e3a0c1b8e9d4f6a7c8b1d3e5f6a9b8c7d6e5f4a3b2c786"
      - key: JWT_REFRESH_SECRET
        value: "2f7c9e5a8a4d9e3a0c1b8e9d4f6a7c8b1d3e5f6a9b8c7d6e5f4a3b2c777"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "30d"

      - key: CORS_ORIGIN
        value: "https://your-app.onrender.com"

      - key: LIVEKIT_URL
        value: "https://vybekart-jw64j04u.livekit.cloud"
      - key: LIVEKIT_API_KEY
        value: "API652uzejsxjAQ"
      - key: LIVEKIT_API_SECRET
        value: "QaSpsD5ZeaKS7VBhHVW64ZdnNPPpDGJXaDRnims0lKY"

      # ------------------------------------------------------------------
      # Live stream → MP4 replay (LiveKit egress → Supabase Storage via S3 protocol)
      # ------------------------------------------------------------------
      # Dashboard: Supabase → Storage → enable S3 protocol → create bucket → S3 access keys.
      # Set bucket to PUBLIC (or add policy) so replay MP4 URLs play in the app.
      # LiveKit webhook (Cloud UI): POST ${API_PUBLIC_URL}/webhooks/livekit (egress_ended).
      - key: LIVEKIT_RECORDING_USE_SUPABASE
        value: "true"
      # S3 endpoint is derived from SUPABASE_URL as https://<ref>.storage.supabase.co/storage/v1/s3
      - key: LIVEKIT_RECORDING_S3_FORCE_PATH_STYLE
        value: "true"
      - key: LIVEKIT_RECORDING_S3_BUCKET
        sync: false
      # Copy "Region" from Supabase Storage S3 settings (often "local" or your project region)
      - key: LIVEKIT_RECORDING_S3_REGION
        sync: false
      - key: LIVEKIT_RECORDING_S3_ACCESS_KEY
        sync: false
      - key: LIVEKIT_RECORDING_S3_SECRET
        sync: false
      # Override only if auto endpoint fails (default: empty = derive from SUPABASE_URL)
      - key: LIVEKIT_RECORDING_S3_ENDPOINT
        sync: false
      # Dev only — never enable in production (skips LiveKit webhook signature check)
      - key: LIVEKIT_WEBHOOK_SKIP_VERIFY
        value: "false"

      - key: SUPPORT_ACCOUNT_MANAGER_NAME
        value: "Shubham Pol"
      - key: SUPPORT_ACCOUNT_MANAGER_EMAIL
        value: "support@vybekart.co.in"
      - key: SUPPORT_ESCALATION_LEVELS_JSON
        value: '[{"level":1,"title":"CEO","description":"...","contactName":"","contactEmail":"ceo@vybekart.co.in"}]'

      - key: MAIL_HOST
        value: "smtp.gmail.com"
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        value: "vybekart88@gmail.com"
      - key: MAIL_PASS
        value: "uikcptploswockgb"
      - key: MAIL_FROM
        value: "contact@vybekart.co.in"
      - key: NOREPLY_EMAIL
        value: "noreply@vybekart.co.in"
      # Emails: logo auto-built from SUPABASE_URL + vybekart_logo.png if ALPHA_LOGO_URL unset
      - key: ALPHA_LOGO_URL
        sync: false
      - key: VYBEKART_EMAIL_LOGO_PATH
        value: "vybekart_logo.png"
      - key: ALPHA_HERO_IMAGE_URL
        sync: false
      # Set in Dashboard for concern emails (Render free tier blocks SMTP). Get key: https://resend.com
      - key: RESEND_API_KEY
        sync: false

      # OTP / SMS (DLT via Fast2SMS — set message_ids in Dashboard after template approval)
      - key: OTP_ENV
        value: "production"
      - key: ANDROID_SMS_APP_HASH
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_ROUTE
        value: "dlt"
      - key: FAST2SMS_SENDER_ID
        value: "VYBEKT"
      - key: FAST2SMS_DLT_MSG_ID_LOGIN
        sync: false
      - key: FAST2SMS_DLT_MSG_ID_BUYER_SIGNUP
        sync: false
      - key: FAST2SMS_DLT_MSG_ID_SELLER_SIGNUP
        sync: false
      - key: FAST2SMS_DLT_MSG_ID_FORGOT_PASSWORD
        sync: false

      # FCM (Firebase Admin): full service-account JSON as a single-line string. Set in Dashboard (do not commit).
      # Firebase Console → Project settings → Service accounts → Generate new private key.
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

      - key: USE_REAL_IVS
        value: "false"
      - key: RUN_DUMMY_SEED_ON_DEPLOY
        value: "false"

      # Delhivery (same-day / express) — set tokens in Render Dashboard when ready
      - key: DELHIVERY_ENV
        value: "staging"
      - key: DELHIVERY_API_TOKEN_STAGING
        sync: false
      - key: DELHIVERY_API_TOKEN_PROD
        sync: false
      - key: DELHIVERY_CLIENT_NAME
        sync: false
      - key: DELHIVERY_PICKUP_LOCATION
        sync: false

      # Razorpay Standard Checkout (buyer payments) — set test keys in Render Dashboard:
      # https://dashboard.razorpay.com/app/keys
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
